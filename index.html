<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>후지록 페스티벌 준비물 체크리스트</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0E1117;
            --card-bg: #1A1A24;
            --primary: #FF8A00;
            --accent: #FF4B4B;
            --text-main: #FFFFFF;
            --text-sub: #A0A0B0;
            --border-color: #2D2D3D;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Hero Header */
        .hero {
            background: linear-gradient(135deg, #1A1A24 0%, #252538 100%);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .hero h1 {
            font-size: 2.25rem;
            font-weight: 700;
            background: linear-gradient(90deg, #FF4B4B 0%, #FF8A00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .hero p {
            color: var(--text-sub);
            font-size: 1.05rem;
        }

        /* Stats & Controls Section */
        .stats-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .progress-bar-bg {
            flex-grow: 1;
            background-color: #2D2D3D;
            height: 16px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #FF4B4B 0%, #FF8A00 100%);
            height: 100%;
            width: 0%;
            border-radius: 8px;
            transition: var(--transition);
        }

        .progress-text {
            font-size: 1.1rem;
            font-weight: 600;
            min-width: 100px;
            text-align: right;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        button {
            font-family: inherit;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .btn-save {
            background-color: var(--accent);
            color: var(--text-main);
        }

        .btn-save:hover {
            background-color: #E03E3E;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 75, 75, 0.4);
        }

        .btn-reset {
            background-color: transparent;
            color: var(--text-sub);
            border: 1px solid var(--border-color);
        }

        .btn-reset:hover {
            color: var(--text-main);
            border-color: var(--text-sub);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Category Card Grid */
        .category-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: border-color 0.3s ease;
            position: relative;
        }

        .category-card:hover {
            border-color: #3E3E52;
        }

        .category-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            background-color: rgba(255, 255, 255, 0.02);
            transition: var(--transition);
        }

        .category-header:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .category-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .category-badge {
            background-color: var(--accent);
            color: var(--text-main);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(255, 75, 75, 0.3);
            transition: var(--transition);
        }

        .category-badge.complete {
            background-color: #2ED573;
            box-shadow: 0 2px 8px rgba(46, 213, 115, 0.3);
        }

        .toggle-arrow {
            font-size: 0.95rem;
            color: var(--text-sub);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
        }

        .category-content {
            padding: 24px;
            border-top: 1px solid var(--border-color);
            transition: max-height 0.4s ease-out, padding 0.4s ease-out, opacity 0.3s ease;
            max-height: 2500px;
            opacity: 1;
        }

        .category-card.collapsed .category-content {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
            border-top-color: transparent;
            pointer-events: none;
        }

        .category-card.collapsed .toggle-arrow {
            transform: rotate(-180deg);
        }

        /* Drag and Drop Aesthetics */
        .drag-handle {
            color: var(--text-sub);
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            transition: var(--transition);
            flex-shrink: 0;
            user-select: none;
            touch-action: none;
        }

        .drag-handle:hover {
            opacity: 1;
            color: var(--primary);
        }

        .category-drag-handle {
            margin-right: 12px;
        }

        .item-drag-handle {
            margin-right: 12px;
        }

        .dragging {
            opacity: 0.15 !important;
            background-color: rgba(255, 255, 255, 0.05) !important;
        }

        body.is-sorting * {
            user-select: none !important;
            -webkit-user-select: none !important;
        }

        .checklist-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 50px;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            position: relative;
            padding: 6px 0;
            user-select: none;
            transition: background-color 0.2s ease;
        }

        /* Custom Checkbox Design */
        .checklist-item input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            height: 22px;
            width: 22px;
            background-color: transparent;
            border: 2px solid var(--text-sub);
            border-radius: 6px;
            margin-right: 15px;
            position: relative;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .checklist-item:hover input[type="checkbox"] ~ .checkmark {
            border-color: var(--text-main);
        }

        .checklist-item input[type="checkbox"]:checked ~ .checkmark {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checklist-item input[type="checkbox"]:checked ~ .checkmark:after {
            display: block;
        }

        .checklist-item .checkmark:after {
            left: 6px;
            top: 2px;
            width: 5px;
            height: 11px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .item-text {
            font-size: 1.05rem;
            color: var(--text-main);
            transition: var(--transition);
        }

        .checklist-item input[type="checkbox"]:checked ~ .item-text {
            color: var(--text-sub);
            text-decoration: line-through;
        }

        /* Edit Mode Styles */
        .edit-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed var(--border-color);
            color: var(--text-main);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: inherit;
            font-weight: inherit;
            width: 100%;
            outline: none;
            transition: var(--transition);
        }

        .edit-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .btn-delete {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--accent);
            opacity: 0.6;
            transition: var(--transition);
            padding: 4px 8px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-delete:hover {
            opacity: 1;
            transform: scale(1.15);
        }

        .edit-controls-container {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }

        .btn-add-item {
            font-size: 0.85rem;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-add-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 50px;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            body {
                padding: 20px 10px;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .stats-panel {
                padding: 16px;
            }
            .btn-group {
                flex-direction: column;
            }
            button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="hero">
        <h1>🎸 FUJI ROCK FESTIVAL 🏔️</h1>
        <p>후지록 페스티벌 준비물 체크리스트로 완벽한 축제를 준비하세요!</p>
    </div>

    <!-- Status panel (Top) -->
    <div class="stats-panel">
        <div class="progress-container">
            <!-- Circular Progress Loader Ring -->
            <div id="progressRingContainer" style="position: relative; width: 64px; height: 64px; flex-shrink: 0;">
                <svg width="64" height="64" viewBox="0 0 64 64">
                    <circle cx="32" cy="32" r="26" stroke="#2D2D3D" stroke-width="6" fill="transparent" />
                    <circle id="progressRingFill" cx="32" cy="32" r="26" stroke="var(--accent)" stroke-width="6" fill="transparent"
                            stroke-dasharray="163.36" stroke-dashoffset="163.36" stroke-linecap="round"
                            style="transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%;" />
                </svg>
                <div id="progressRingText" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; font-weight: 700; color: #FFFFFF;">0%</div>
            </div>

            <!-- Linear Progress bar -->
            <div style="flex-grow: 1; display: flex; flex-direction: column; gap: 8px;">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.95rem;">
                    <div style="color: var(--text-sub);" id="checkedCountText">선택된 항목: 0 / 74</div>
                    <div class="progress-text" id="progressText" style="font-weight: 600;">진행률: 0%</div>
                </div>
            </div>
        </div>
        
        <!-- Instruction Text with drag handle prefix -->
        <div style="display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--text-sub); font-size: 0.95rem; margin-top: -5px; margin-bottom: 5px;">
            <div class="drag-handle" style="cursor: default; opacity: 0.4;">
                <svg width="12" height="18" viewBox="0 0 12 18" fill="currentColor">
                    <circle cx="2.5" cy="3" r="1.5" stroke="none" />
                    <circle cx="2.5" cy="9" r="1.5" stroke="none" />
                    <circle cx="2.5" cy="15" r="1.5" stroke="none" />
                    <circle cx="9.5" cy="3" r="1.5" stroke="none" />
                    <circle cx="9.5" cy="9" r="1.5" stroke="none" />
                    <circle cx="9.5" cy="15" r="1.5" stroke="none" />
                </svg>
            </div>
            <span>손잡이로 드래그하여 정렬, 탭으로 확인</span>
        </div>

        <div class="btn-group">
            <button id="editToggleBtn" class="btn-reset" onclick="toggleEditMode()" style="border-color: var(--primary); color: var(--primary);">
                ✏️ 편집 모드
            </button>
            <button class="btn-reset" onclick="resetAll()">
                🔄 초기화
            </button>
            <button class="btn-save" onclick="saveAsImage()">
                📸 이미지로 저장 (JPG)
            </button>
        </div>
    </div>

    <!-- Categories -->
    <div id="checklistCategories"></div>

    <!-- Controls (Bottom) -->
    <div class="stats-panel" style="margin-top: 30px;">
        <div class="btn-group" style="justify-content: center; width: 100%;">
            <button id="editToggleBtnBottom" class="btn-reset" onclick="toggleEditMode()" style="border-color: var(--primary); color: var(--primary);">
                ✏️ 편집 모드
            </button>
            <button class="btn-reset" onclick="resetAll()">
                🔄 초기화
            </button>
            <button class="btn-save" onclick="saveAsImage()">
                📸 이미지로 저장 (JPG)
            </button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>만든이 @sigong &copy; 2026</p>
    </footer>
</div>

<script>
    // Updated checklist matching the provided web URL (Translated to Korean, grouped with subheaders)
    const packingList = {
        "공연장 휴대용 배낭": {
            "[배면 포켓]": ["선크림", "페이스 시트", "맥주 너클 오프너", "모기 퇴치 스프레이"],
            "[사이드 포켓]": ["물병/텀블러"],
            "[내용물]": ["수건", "판초 우의 (파랑)", "플리스"],
            "<노란 파우치>": ["보조배터리", "USB 케이블류", "헤드랜턴", "AAA 건전지"],
            "<빨간 파우치>": ["스포츠 테이핑 테이프", "대일밴드 (반창고)", "손톱깎이", "콘택트렌즈", "소염진통제 (로키소닌)", "파스 (로키소닌 패치)", "휴대용 티슈"]
        },
        "숙소 배낭": {
            "[등 포켓]": ["지갑 (카드류 제외)"],
            "[내용물]": ["비닐봉지", "페스티벌용 T셔츠 (3장)", "속옷 (1장)", "양말 (1켤레)", "여분 수건", "3일차 손수건", "헤어 스프레이", "스킨/토너", "크림", "면도기"]
        },
        "차에 두고 갈 것": {
            "": ["에어매트", "미니 아이스박스", "접이식 우산"],
            "[대시보드]": ["주차권", "손목밴드 (입장권)", "타임테이블"],
            "[차박 박스]": ["바디 시트", "취침용 T셔츠", "속옷 (2장)", "양말 (1켤레)", "복귀용 여분 옷", "비닐봉지 (여분)", "2일차 수건", "3일차 수건", "막 쓰는 수건", "2일차 손수건 (빨아서 쓰기)", "모자 (캡)"],
            "[기타 박스]": ["장화", "샌들", "차량용 햇빛 가리개"],
            "[노란 배낭]": ["접이식 의자 (대)"]
        },
        "당일 챙길 것": {
            "<카드 지갑>": ["건강보험증", "운전면허증", "현금"],
            "<기타>": ["손수건", "집 열쇠", "차 열쇠", "애플워치", "애플워치 충전기/배터리", "멀티탭", "스킨/토너 (여행용)", "크림 (여행용)", "면도기 (여분)", "무선 이어폰"]
        },
        "당일 착용할 것": {
            "": ["선글라스", "햇 (모자)", "기능성 이너웨어", "기능성 상의", "기능성 하의", "T셔츠", "속건성 바지", "속옷", "손수건", "스마트폰"]
        }
    };

    let editMode = false;
    let focusAfterRender = null;

    // Load custom layout order or fallback to default
    function getSavedOrder() {
        const saved = localStorage.getItem('fujirock_checklist_order');
        if (saved) {
            let order = JSON.parse(saved);
            // LocalStorage Migration: Update old subheader names to keep existing sessions synced
            if (order.items && order.items["당일 챙길 것"]) {
                order.items["당일 챙길 것"] = order.items["당일 챙길 것"].map(node => {
                    if (node.type === 'subheader' && node.text === '<카드 지갑 (UnderTheSun)>') {
                        node.text = '<카드 지갑>';
                    }
                    return node;
                });
            }
            // LocalStorage Migration: Update category "회장 휴대용 배낭" to "공연장 휴대용 배낭"
            if (order.categories) {
                const idx = order.categories.indexOf("회장 휴대용 배낭");
                if (idx !== -1) {
                    order.categories[idx] = "공연장 휴대용 배낭";
                }
                if (order.items && order.items["회장 휴대용 배낭"]) {
                    order.items["공연장 휴대용 배낭"] = order.items["회장 휴대용 배낭"];
                    delete order.items["회장 휴대용 배낭"];
                }
            }
            localStorage.setItem('fujirock_checklist_order', JSON.stringify(order));

            const collapsedRaw = localStorage.getItem('fujirock_collapsed_categories');
            if (collapsedRaw) {
                try {
                    let collapsed = JSON.parse(collapsedRaw);
                    const cIdx = collapsed.indexOf("회장 휴대용 배낭");
                    if (cIdx !== -1) {
                        collapsed[cIdx] = "공연장 휴대용 배낭";
                        localStorage.setItem('fujirock_collapsed_categories', JSON.stringify(collapsed));
                    }
                } catch (e) {}
            }
            return order;
        }
        
        // Generate default order structure if not already saved
        const order = {
            categories: Object.keys(packingList),
            items: {}
        };
        for (const [category, categoryData] of Object.entries(packingList)) {
            order.items[category] = [];
            for (const [subheader, items] of Object.entries(categoryData)) {
                if (subheader) {
                    order.items[category].push({ type: 'subheader', text: subheader });
                }
                items.forEach(item => {
                    order.items[category].push({ type: 'item', text: item });
                });
            }
        }
        localStorage.setItem('fujirock_checklist_order', JSON.stringify(order));
        return order;
    }

    // Filter checked items from localStorage based on saved layout structure
    const currentOrder = getSavedOrder();
    const allPackingItems = new Set();
    for (const category of currentOrder.categories) {
        const items = currentOrder.items[category] || [];
        items.forEach(node => {
            if (node.type === 'item') {
                allPackingItems.add(node.text);
            }
        });
    }
    const savedItems = JSON.parse(localStorage.getItem('fujirock_checked_items') || '[]');
    let checkedItems = new Set(savedItems.filter(item => allPackingItems.has(item)));

    // Load collapsed preference from localStorage, default all collapsed on first run
    const hasCollapsedPref = localStorage.getItem('fujirock_collapsed_categories');
    let collapsedCategories;
    if (hasCollapsedPref === null) {
        collapsedCategories = new Set(Object.keys(packingList));
        localStorage.setItem('fujirock_collapsed_categories', JSON.stringify(Array.from(collapsedCategories)));
    } else {
        collapsedCategories = new Set(JSON.parse(hasCollapsedPref));
    }

    // Custom Pointer Events based Drag and Drop Engine (Supports desktop mouse & mobile touch natively)
    function makeSortable(container, opts) {
        container.addEventListener('pointerdown', e => {
            if (e.button != null && e.button !== 0) return;
            const handle = e.target.closest(opts.handleSelector);
            if (!handle || !container.contains(handle)) return;
            const row = handle.closest(opts.rowSelector);
            if (!row) return;
            e.preventDefault();
            startDrag(container, row, handle, e, opts);
        });
    }

    function startDrag(container, row, handle, e, opts) {
        const rect = row.getBoundingClientRect();
        const offsetY = e.clientY - rect.top;
        const offsetX = e.clientX - rect.left;

        // Create high-fidelity drag clone (ghost)
        const ghost = row.cloneNode(true);
        ghost.classList.add('drag-ghost');
        ghost.style.position = 'fixed';
        ghost.style.zIndex = '10000';
        ghost.style.pointerEvents = 'none';
        ghost.style.width = rect.width + 'px';
        ghost.style.height = rect.height + 'px';
        ghost.style.left = rect.left + 'px';
        ghost.style.top = rect.top + 'px';
        ghost.style.opacity = '0.85';
        ghost.style.boxShadow = '0 12px 30px rgba(0, 0, 0, 0.5)';
        ghost.style.transform = 'scale(1.02)';
        ghost.style.transition = 'transform 0.1s ease';
        document.body.appendChild(ghost);

        row.classList.add('dragging');
        document.body.classList.add('is-sorting');

        try {
            handle.setPointerCapture(e.pointerId);
        } catch (_) {}

        const moveGhost = (clientX, clientY) => {
            ghost.style.top = (clientY - offsetY) + 'px';
            ghost.style.left = (clientX - offsetX) + 'px';
        };

        moveGhost(e.clientX, e.clientY);

        const onMove = ev => {
            moveGhost(ev.clientX, ev.clientY);

            // Auto-scroll when dragging near viewport top/bottom
            const scrollMargin = 72;
            if (ev.clientY < scrollMargin) {
                window.scrollBy(0, -8);
            } else if (ev.clientY > window.innerHeight - scrollMargin) {
                window.scrollBy(0, 8);
            }

            if (opts.type === 'category') {
                const siblings = [...container.children].filter(ch => ch.classList.contains('category-card') && ch !== row);
                let after = null;
                for (const s of siblings) {
                    const r = s.getBoundingClientRect();
                    if (ev.clientY < r.top + r.height / 2) {
                        after = s;
                        break;
                    }
                }
                if (after == null) {
                    container.appendChild(row);
                } else {
                    container.insertBefore(row, after);
                }
            } else if (opts.type === 'item') {
                // Find list container closest to pointer coordinates to support cross-category drops
                let targetList = container;
                const lists = document.querySelectorAll('.checklist-list');
                for (const list of lists) {
                    const rList = list.getBoundingClientRect();
                    if (ev.clientY >= rList.top - 30 && ev.clientY <= rList.bottom + 30 &&
                        ev.clientX >= rList.left - 30 && ev.clientX <= rList.right + 30) {
                        targetList = list;
                        break;
                    }
                }

                const siblings = [...targetList.children].filter(ch => ch !== row);
                let after = null;
                for (const s of siblings) {
                    const r = s.getBoundingClientRect();
                    if (ev.clientY < r.top + r.height / 2) {
                        after = s;
                        break;
                    }
                }
                if (after == null) {
                    targetList.appendChild(row);
                } else {
                    targetList.insertBefore(row, after);
                }
            }
        };

        const onUp = () => {
            document.removeEventListener('pointermove', onMove);
            document.removeEventListener('pointerup', onUp);
            ghost.remove();
            row.classList.remove('dragging');
            document.body.classList.remove('is-sorting');
            saveCurrentOrder();
            renderChecklist();
        };

        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
    }

    // Save custom category and items layout order to localStorage
    function saveCurrentOrder() {
        const order = {
            categories: [],
            items: {}
        };
        
        const cards = document.querySelectorAll('.category-card');
        cards.forEach(card => {
            const titleEl = card.querySelector('.category-title-input');
            const categoryName = titleEl ? titleEl.value : card.querySelector('.category-title').innerText;
            order.categories.push(categoryName);
            
            order.items[categoryName] = [];
            const listContainer = card.querySelector('.checklist-list');
            const children = listContainer.children;
            for (let child of children) {
                if (child.classList.contains('checklist-subheader')) {
                    const subInput = child.querySelector('.subheader-input');
                    const subText = subInput ? subInput.value : child.getAttribute('data-text');
                    order.items[categoryName].push({ type: 'subheader', text: subText });
                } else if (child.classList.contains('checklist-item')) {
                    const itemInput = child.querySelector('.item-input');
                    const itemText = itemInput ? itemInput.value : child.getAttribute('data-text');
                    order.items[categoryName].push({ type: 'item', text: itemText });
                }
            }
        });
        
        localStorage.setItem('fujirock_checklist_order', JSON.stringify(order));
    }

    // Toggle collapse/expand status of a category card
    function toggleCategory(category) {
        const card = document.getElementById(`card-${category}`);
        if (card.classList.contains('collapsed')) {
            card.classList.remove('collapsed');
            collapsedCategories.delete(category);
        } else {
            card.classList.add('collapsed');
            collapsedCategories.add(category);
        }
        localStorage.setItem('fujirock_collapsed_categories', JSON.stringify(Array.from(collapsedCategories)));
    }

    // Toggle Edit Mode
    function toggleEditMode() {
        editMode = !editMode;
        const btns = document.querySelectorAll('#editToggleBtn, #editToggleBtnBottom');
        btns.forEach(btn => {
            if (editMode) {
                btn.innerText = '✓ 완료';
                btn.style.backgroundColor = 'var(--primary)';
                btn.style.color = '#FFFFFF';
            } else {
                btn.innerText = '✏️ 편집 모드';
                btn.style.backgroundColor = 'transparent';
                btn.style.color = 'var(--primary)';
            }
        });
        renderChecklist();
    }

    // Category renaming
    function renameCategory(oldName, newName) {
        newName = (newName || '').trim();
        if (!newName || oldName === newName) return;

        const order = getSavedOrder();
        const index = order.categories.indexOf(oldName);
        if (index !== -1) {
            order.categories[index] = newName;
            order.items[newName] = order.items[oldName];
            delete order.items[oldName];

            if (collapsedCategories.has(oldName)) {
                collapsedCategories.delete(oldName);
                collapsedCategories.add(newName);
                localStorage.setItem('fujirock_collapsed_categories', JSON.stringify(Array.from(collapsedCategories)));
            }

            localStorage.setItem('fujirock_checklist_order', JSON.stringify(order));
            renderChecklist();
        }
    }

    // Category deletion
    function deleteCategory(category) {
        if (!confirm(`"${category}" 카테고리를 정말 삭제하시겠습니까?`)) return;
        const order = getSavedOrder();
        const index = order.categories.indexOf(category);
        if (index !== -1) {
            order.categories.splice(index, 1);
            delete order.items[category];

            if (collapsedCategories.has(category)) {
                collapsedCategories.delete(category);
                localStorage.setItem('fujirock_collapsed_categories', JSON.stringify(Array.from(collapsedCategories)));
            }

            localStorage.setItem('fujirock_checklist_order', JSON.stringify(order));
            renderChecklist();
        }
    }

    // Item/subheader renaming
    function renameItem(category, index, newText) {
        newText = (newText || '').trim();

        const order = getSavedOrder();
        if (order.items[category] && order.items[category][index]) {
            const oldText = order.items[category][index].text;
            if (oldText === newText) return;

            order.items[category][index].text = newText;

            if (order.items[category][index].type === 'item') {
                if (checkedItems.has(oldText)) {
                    checkedItems.delete(oldText);
                    if (newText) checkedItems.add(newText);
                    localStorage.setItem('fujirock_checked_items', JSON.stringify(Array.from(checkedItems)));
                }
            }

            localStorage.setItem('fujirock_checklist_order', JSON.stringify(order));
            renderChecklist();
        }
    }

    // Item/subheader deletion
    function deleteItem(category, index) {
        const order = getSavedOrder();
        if (order.items[category] && order.items[category][index]) {
            const node = order.items[category][index];
            if (node.type === 'item' && checkedItems.has(node.text)) {
                checkedItems.delete(node.text);
                localStorage.setItem('fujirock_checked_items', JSON.stringify(Array.from(checkedItems)));
            }
            order.items[category].splice(index, 1);
            localStorage.setItem('fujirock_checklist_order', JSON.stringify(order));
            renderChecklist();
        }
    }

    // Add item or subheader inside category
    function addItemToCategory(category, type) {
        const order = getSavedOrder();
        if (order.items[category]) {
            order.items[category].push({ type: type, text: '' });
            localStorage.setItem('fujirock_checklist_order', JSON.stringify(order));
            
            // Set focus flag for this index
            focusAfterRender = { category: category, index: order.items[category].length - 1 };
            
            renderChecklist();
        }
    }

    // Add new Category card
    function addNewCategory() {
        const order = getSavedOrder();
        const newCatName = `새 카테고리 ${order.categories.length + 1}`;
        order.categories.push(newCatName);
        order.items[newCatName] = [];
        localStorage.setItem('fujirock_checklist_order', JSON.stringify(order));
        
        focusAfterRender = { category: newCatName, index: 'name' };
        
        renderChecklist();
    }

                    <circle cx="2.5" cy="15" r="1.5" stroke="none" />
                    <circle cx="9.5" cy="3" r="1.5" stroke="none" />
                    <circle cx="9.5" cy="9" r="1.5" stroke="none" />

                input.value = category;
                input.style.fontWeight = 'bold';
                input.style.fontSize = '1.25rem';
                input.style.color = 'var(--primary)';
                input.style.border = 'none';
                input.style.background = 'transparent';

                });
                titleContainer.appendChild(input);
            } else {

                title.className = 'category-title';
                title.innerText = category;
                titleContainer.appendChild(title);

            header.appendChild(titleContainer);

            // Badge and arrow container
            const badgeContainer = document.createElement('div');
            badgeContainer.style.display = 'flex';
            badgeContainer.style.alignItems = 'center';
            badgeContainer.style.gap = '10px';

            if (editMode) {
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-delete';
                deleteBtn.innerHTML = '🗑';
                deleteBtn.title = '카테고리 삭제';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteCategory(category);
                });
                badgeContainer.appendChild(deleteBtn);
            } else {
                const badge = document.createElement('span');
                badge.className = 'category-badge';
                badge.id = `badge-${category}`;
                badgeContainer.appendChild(badge);
            }

            const arrow = document.createElement('span');
            arrow.className = 'toggle-arrow';
            arrow.innerText = '▲';
            badgeContainer.appendChild(arrow);

            header.appendChild(badgeContainer);
            card.appendChild(header);

            // Category Content
            const content = document.createElement('div');
            content.className = 'category-content';
            content.id = `content-${category}`;

            const list = document.createElement('div');
            list.className = 'checklist-list';
            list.id = `list-${category}`;

            const categoryItems = currentOrder.items[category] || [];
            
            // Track if current item should be nested under a subheading
            let activeSubheader = false;

            categoryItems.forEach((node, itemIndex) => {
                if (node.type === 'subheader') {
                    activeSubheader = node.text;
                    const subHeaderDiv = document.createElement('div');
                    subHeaderDiv.className = 'checklist-subheader';
                    subHeaderDiv.setAttribute('data-text', node.text);
                    subHeaderDiv.style.display = 'flex';
                    subHeaderDiv.style.alignItems = 'center';
                    subHeaderDiv.style.fontWeight = 'bold';
                    subHeaderDiv.style.color = 'var(--accent)';
                    subHeaderDiv.style.marginTop = '12px';
                    subHeaderDiv.style.marginBottom = '6px';
                    subHeaderDiv.style.fontSize = '1.05rem';
                    subHeaderDiv.style.width = '100%';

                    // Subheader drag handle
                    const subHandle = document.createElement('div');
                    subHandle.className = 'drag-handle item-drag-handle';
                    subHandle.innerHTML = `
                        <svg width="12" height="18" viewBox="0 0 12 18" fill="currentColor">
                            <circle cx="2.5" cy="3" r="1.5" stroke="none" />
                            <circle cx="2.5" cy="9" r="1.5" stroke="none" />
                            <circle cx="2.5" cy="15" r="1.5" stroke="none" />
                            <circle cx="9.5" cy="3" r="1.5" stroke="none" />
                            <circle cx="9.5" cy="9" r="1.5" stroke="none" />
                            <circle cx="9.5" cy="15" r="1.5" stroke="none" />
                        </svg>
                    `;
                    subHeaderDiv.appendChild(subHandle);

                    if (editMode) {
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.className = 'edit-input subheader-input';
                        input.value = node.text;
                        input.placeholder = '소제목 입력';
                        input.style.fontWeight = 'bold';
                        input.style.color = 'var(--accent)';
                        input.style.border = 'none';
                        input.style.background = 'transparent';
                        input.style.marginLeft = '5px';
                        input.style.flexGrow = '1';
                        input.addEventListener('change', () => {
                            renameItem(category, itemIndex, input.value);
                        });
                        input.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') input.blur();
                        });
                        subHeaderDiv.appendChild(input);

                        // Delete button
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'btn-delete';
                        deleteBtn.innerHTML = '🗑';

                            deleteItem(category, itemIndex);

                    } else {

                        subTextSpan.innerText = node.text ? `— ${node.text}` : '— (소제목 없음)';

                            subTextSpan.style.color = 'var(--text-sub)';
                            subTextSpan.style.fontStyle = 'italic';
                        }
                        subHeaderDiv.appendChild(subTextSpan);
                    }

                    list.appendChild(subHeaderDiv);
                } else if (node.type === 'item') {
                    const label = document.createElement('div');
                    label.className = 'checklist-item';
                    label.setAttribute('data-text', node.text);
                    if (activeSubheader) {
                        label.style.paddingLeft = '15px'; // Indent grouped items
                    }

                    // Item drag handle
                    const itemHandle = document.createElement('div');
                    itemHandle.className = 'drag-handle item-drag-handle';
                    itemHandle.innerHTML = `
                        <svg width="12" height="18" viewBox="0 0 12 18" fill="currentColor">
                            <circle cx="2.5" cy="3" r="1.5" stroke="none" />
                            <circle cx="2.5" cy="9" r="1.5" stroke="none" />
                            <circle cx="2.5" cy="15" r="1.5" stroke="none" />
                            <circle cx="9.5" cy="3" r="1.5" stroke="none" />
                            <circle cx="9.5" cy="9" r="1.5" stroke="none" />
                            <circle cx="9.5" cy="15" r="1.5" stroke="none" />
                        </svg>

                    const checkmark = document.createElement('span');
                    checkmark.className = 'checkmark';
                    checkmark.style.cursor = 'pointer';
                    checkmark.addEventListener('click', () => {
                        checkbox.checked = !checkbox.checked;
                        toggleItem(node.text, checkbox.checked);
                    });

                    if (editMode) {
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.className = 'edit-input item-input';
                        input.value = node.text;
                        input.placeholder = '준비물 입력';
                        input.style.border = 'none';
                        input.style.background = 'transparent';
                        input.style.flexGrow = '1';
                        input.addEventListener('change', () => {
                            renameItem(category, itemIndex, input.value);
                        });
                        input.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') input.blur();
                        });
                        label.appendChild(input);

                        // Delete button
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'btn-delete';
                        deleteBtn.innerHTML = '🗑';
                        deleteBtn.addEventListener('click', () => {
                            deleteItem(category, itemIndex);
                        });

                        const text = document.createElement('span');
                        text.className = 'item-text';
                        text.innerText = node.text || '(이름 없음)';

                            text.style.fontStyle = 'italic';
                        }
                        text.style.cursor = 'pointer';
                        text.addEventListener('click', () => {

                            toggleItem(node.text, checkbox.checked);

                        label.appendChild(checkbox);

            content.appendChild(list);

                    addItemToCategory(category, 'subheader');

                addItemBtn.className = 'btn-add-item';
                addItemBtn.innerText = '＋ 준비물 추가';
                addItemBtn.addEventListener('click', () => {

                controlsDiv.appendChild(addItemBtn);

            const addCatBtn = document.createElement('button');
            addCatBtn.className = 'btn-reset';
            addCatBtn.style.borderColor = 'var(--primary)';
            addCatBtn.style.color = 'var(--primary)';
            addCatBtn.innerText = '＋ 새 카테고리 추가';
            addCatBtn.addEventListener('click', addNewCategory);

            container.appendChild(addCatContainer);

            rowSelector: '.category-card',
            handleSelector: '.category-drag-handle',
            type: 'category'
        });

        lists.forEach(list => {
            makeSortable(list, {
                rowSelector: '.checklist-item, .checklist-subheader',
                handleSelector: '.item-drag-handle',
                type: 'item'
            });
        });

        // Handle autofocus of newly added elements
        if (typeof focusAfterRender !== 'undefined' && focusAfterRender !== null) {
            const { category, index } = focusAfterRender;
            focusAfterRender = null;

            const card = document.getElementById(`card-${category}`);
            if (card) {
                // Ensure card is expanded to make inputs visible/focusable
                card.classList.remove('collapsed');
                collapsedCategories.delete(category);
                localStorage.setItem('fujirock_collapsed_categories', JSON.stringify(Array.from(collapsedCategories)));

                if (index === 'name') {
                    const input = card.querySelector('.category-title-input');
                    if (input) {
                        input.focus();
                        input.select();
                    }
                } else {
                    const list = card.querySelector('.checklist-list');
                    if (list) {
                        const children = list.children;
                        const targetChild = children[index];
                        if (targetChild) {
                            const input = targetChild.querySelector('input[type="text"]');
                            if (input) {
                                input.focus();
                            }
                        }
                    }
                }
            }
        }

        updateProgress();
    }

    // Toggle check status and sync to localStorage
    function toggleItem(item, isChecked) {
        if (isChecked) {
            checkedItems.add(item);
        } else {
            checkedItems.delete(item);
        }
        localStorage.setItem('fujirock_checked_items', JSON.stringify(Array.from(checkedItems)));
        updateProgress();
    }

    // Calculate total count and update progress UI based on current order data
    function updateProgress() {
        let grandTotal = 0;
        let grandChecked = 0;
        
        const currentOrder = getSavedOrder();
        
        for (const category of currentOrder.categories) {
            let catTotal = 0;
            let catChecked = 0;
            
            const categoryItems = currentOrder.items[category] || [];
            categoryItems.forEach(node => {
                if (node.type === 'item') {
                    catTotal++;
                    if (checkedItems.has(node.text)) {
                        catChecked++;
                    }
                }
            });
            
            grandTotal += catTotal;
            grandChecked += catChecked;
            
            const badge = document.getElementById(`badge-${category}`);
            if (badge) {
                badge.innerText = `${catChecked}/${catTotal}`;
                if (catChecked === catTotal && catTotal > 0) {
                    badge.classList.add('complete');
                } else {
                    badge.classList.remove('complete');
                }
            }
        }

        const fillPercent = grandTotal > 0 ? (grandChecked / grandTotal) * 100 : 0;
        
        const fillBar = document.getElementById('progressFill');
        if (fillBar) fillBar.style.width = `${fillPercent}%`;
        
        const pText = document.getElementById('progressText');
        if (pText) pText.innerText = `진행률: ${Math.round(fillPercent)}%`;
        
        const cText = document.getElementById('checkedCountText');
        if (cText) cText.innerText = `선택된 항목: ${grandChecked} / ${grandTotal}`;

        // Circular progress ring updates
        const ringFill = document.getElementById('progressRingFill');
        const ringText = document.getElementById('progressRingText');
        if (ringFill && ringText) {
            const circumference = 163.36;
            const offset = circumference * (1 - fillPercent / 100);
            ringFill.style.strokeDashoffset = offset;
            ringText.innerText = `${Math.round(fillPercent)}%`;
        }
    }

    // Clear state
    function resetAll() {
        if (confirm("모든 체크 상태와 항목 순서를 초기화하시겠습니까?")) {
            checkedItems.clear();
            localStorage.removeItem('fujirock_checked_items');
            localStorage.removeItem('fujirock_checklist_order');
            localStorage.removeItem('fujirock_collapsed_categories');
            collapsedCategories = new Set(Object.keys(packingList));
            localStorage.setItem('fujirock_collapsed_categories', JSON.stringify(Array.from(collapsedCategories)));
            renderChecklist();
        }
    }

    // Draw checklist as a downloadable high-quality mobile JPG image using Canvas API
    function saveAsImage() {
        const currentOrder = getSavedOrder();

        // 1) 체크된 항목만 카테고리별로 수집
        const filteredData = [];
        let checkedTotal = 0;
        let allTotal = 0;

        for (const category of currentOrder.categories) {
            const categoryItems = currentOrder.items[category] || [];
            const filtered = [];
            let lastSubheader = null;
            let subheaderHasItems = false;

            categoryItems.forEach(node => {
                if (node.type === 'subheader') {
                    lastSubheader = node;
                    subheaderHasItems = false;
                } else if (node.type === 'item') {
                    allTotal++;
                    if (checkedItems.has(node.text)) {
                        checkedTotal++;
                        // Add subheader if not already added for this group
                        if (lastSubheader && !subheaderHasItems) {
                            filtered.push(lastSubheader);
                            subheaderHasItems = true;
                        }
                        filtered.push(node);
                    }
                }
            });

            if (filtered.length > 0) {
                filteredData.push({ category, items: filtered });
            }
        }

        if (checkedTotal === 0) {
            alert('선택된 항목이 없습니다. 체크박스를 선택한 후 다시 시도해주세요.');
            return;
        }

        // 2) Compute canvas height dynamically
        let numLines = 0;
        let numSubheaders = 0;
        filteredData.forEach(cat => {
            cat.items.forEach(node => {
                if (node.type === 'subheader') numSubheaders++;
                else numLines++;
            });
        });
        const numCategories = filteredData.length;

        const canvas = document.createElement('canvas');
        canvas.width = 800;
        canvas.height = 250 + (numLines * 35) + (numSubheaders * 35) + (numCategories * 65) + 100;

        const ctx = canvas.getContext('2d');

        // Background
        ctx.fillStyle = '#1A1A24';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Header
        ctx.fillStyle = '#FF8A00';
        ctx.font = 'bold 36px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('FUJI ROCK FESTIVAL', canvas.width / 2, 70);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = '20px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
        ctx.fillText('후지록 페스티벌 준비물 체크리스트', canvas.width / 2, 110);

        // Progress
        const progressPct = allTotal > 0 ? Math.round((checkedTotal / allTotal) * 100) : 0;

        ctx.fillStyle = '#2D2D3D';
        drawRoundedRect(ctx, 80, 140, canvas.width - 160, 24, 12);
        ctx.fill();

        if (checkedTotal > 0) {
            ctx.fillStyle = '#FF4B4B';
            const fillWidth = ((canvas.width - 160) * checkedTotal) / allTotal;
            drawRoundedRect(ctx, 80, 140, fillWidth, 24, 12);
            ctx.fill();
        }

        ctx.fillStyle = '#A0A0B0';
        ctx.font = '20px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
        ctx.fillText(`진행률: ${progressPct}% (${checkedTotal} / ${allTotal})`, canvas.width / 2, 195);

        // Divider
        ctx.strokeStyle = '#3D3D4D';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(60, 220);
        ctx.lineTo(canvas.width - 60, 220);
        ctx.stroke();

        // 3) Draw only checked items
        let currY = 260;
        const xLeft = 80;

        for (const catData of filteredData) {
            // Category header
            ctx.fillStyle = '#FF8A00';
            ctx.font = 'bold 26px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(catData.category, xLeft, currY);
            currY += 45;

            let activeSubheader = false;

            catData.items.forEach(node => {
                if (node.type === 'subheader') {
                    activeSubheader = node.text;
                    ctx.fillStyle = '#FF4B4B';
                    ctx.font = 'bold 20px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
                    ctx.fillText(`— ${node.text}`, xLeft + 10, currY);
                    currY += 35;
                } else if (node.type === 'item') {
                    const boxSize = 20;
                    const boxX = activeSubheader ? xLeft + 20 : xLeft + 10;
                    const boxY = currY - 18;

                    // Draw checked checkbox
                    ctx.fillStyle = '#FF4B4B';
                    drawRoundedRect(ctx, boxX, boxY, boxSize, boxSize, 4);
                    ctx.fill();

                    // Draw checkmark
                    ctx.strokeStyle = '#FFFFFF';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(boxX + 5, boxY + 10);
                    ctx.lineTo(boxX + 9, boxY + 14);
                    ctx.lineTo(boxX + 15, boxY + 6);
                    ctx.stroke();

                    // Draw label text
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = '22px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
                    ctx.fillText(node.text, boxX + boxSize + 20, currY);
                    currY += 35;
                }
            });

            currY += 20;
        }

        // Draw footer
        ctx.fillStyle = '#505060';
        ctx.font = '20px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('만든이 @sigong © 2026', canvas.width / 2, canvas.height - 40);

        // Download trigger
        try {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = 'fujirock_checklist.jpg';
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } catch (e) {
            alert('이미지 저장에 실패했습니다: ' + e.message);
        }
    }

    // Helper for rounded rectangles on canvas
    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    // Initialize list on load
    window.onload = renderChecklist;
</script>
