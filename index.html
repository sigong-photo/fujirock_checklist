<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>후지록 페스티벌 준비물 체크리스트</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0E1117;
            --card-bg: #1A1A24;
            --primary: #FF8A00;
            --accent: #FF4B4B;
            --text-main: #FFFFFF;
            --text-sub: #A0A0B0;
            --border-color: #2D2D3D;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Hero Header */
        .hero {
            background: linear-gradient(135deg, #1A1A24 0%, #252538 100%);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .hero h1 {
            font-size: 2.25rem;
            font-weight: 700;
            background: linear-gradient(90deg, #FF4B4B 0%, #FF8A00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .hero p {
            color: var(--text-sub);
            font-size: 1.05rem;
        }

        /* Stats & Controls Section */
        .stats-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .progress-bar-bg {
            flex-grow: 1;
            background-color: #2D2D3D;
            height: 16px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #FF4B4B 0%, #FF8A00 100%);
            height: 100%;
            width: 0%;
            border-radius: 8px;
            transition: var(--transition);
        }

        .progress-text {
            font-size: 1.1rem;
            font-weight: 600;
            min-width: 100px;
            text-align: right;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        button {
            font-family: inherit;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .btn-save {
            background-color: var(--accent);
            color: var(--text-main);
        }

        .btn-save:hover {
            background-color: #E03E3E;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 75, 75, 0.4);
        }

        .btn-reset {
            background-color: transparent;
            color: var(--text-sub);
            border: 1px solid var(--border-color);
        }

        .btn-reset:hover {
            color: var(--text-main);
            border-color: var(--text-sub);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Category Card Grid */
        .category-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: var(--transition);
        }

        .category-card:hover {
            border-color: #3E3E52;
        }

        .category-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            background-color: rgba(255, 255, 255, 0.02);
            transition: var(--transition);
        }

        .category-header:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .category-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .category-badge {
            background-color: var(--accent);
            color: var(--text-main);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(255, 75, 75, 0.3);
            transition: var(--transition);
        }

        .category-badge.complete {
            background-color: #2ED573;
            box-shadow: 0 2px 8px rgba(46, 213, 115, 0.3);
        }

        .toggle-arrow {
            font-size: 0.95rem;
            color: var(--text-sub);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
        }

        .category-content {
            padding: 24px;
            border-top: 1px solid var(--border-color);
            transition: max-height 0.4s ease-out, padding 0.4s ease-out, opacity 0.3s ease;
            max-height: 2500px;
            opacity: 1;
        }

        .category-card.collapsed .category-content {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
            border-top-color: transparent;
            pointer-events: none;
        }

        .category-card.collapsed .toggle-arrow {
            transform: rotate(-180deg);
        }

        /* Drag and Drop Aesthetics */
        .drag-handle {
            color: var(--text-sub);
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            transition: var(--transition);
            flex-shrink: 0;
            user-select: none;
        }

        .drag-handle:hover {
            opacity: 1;
            color: var(--primary);
        }

        .category-drag-handle {
            margin-right: 12px;
        }

        .item-drag-handle {
            margin-right: 12px;
        }

        .dragging {
            opacity: 0.4;
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1.5px dashed var(--primary) !important;
        }

        .checklist-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 50px; /* Helper to allow dropping onto empty list containers */
        }

        .checklist-item {
            display: flex;
            align-items: center;
            position: relative;
            cursor: pointer;
            padding: 6px 0;
            user-select: none;
            transition: background-color 0.2s ease;
        }

        /* Custom Checkbox Design */
        .checklist-item input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            height: 22px;
            width: 22px;
            background-color: transparent;
            border: 2px solid var(--text-sub);
            border-radius: 6px;
            margin-right: 15px;
            position: relative;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .checklist-item:hover input ~ .checkmark {
            border-color: var(--text-main);
        }

        .checklist-item input:checked ~ .checkmark {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checklist-item input:checked ~ .checkmark:after {
            display: block;
        }

        .checklist-item .checkmark:after {
            left: 6px;
            top: 2px;
            width: 5px;
            height: 11px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .item-text {
            font-size: 1.05rem;
            color: var(--text-main);
            transition: var(--transition);
        }

        .checklist-item input:checked ~ .item-text {
            color: var(--text-sub);
            text-decoration: line-through;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 50px;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            body {
                padding: 20px 10px;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .stats-panel {
                padding: 16px;
            }
            .btn-group {
                flex-direction: column;
            }
            button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="hero">
        <h1>🎸 FUJI ROCK FESTIVAL 🏔️</h1>
        <p>후지록 페스티벌 준비물 체크리스트로 완벽한 축제를 준비하세요!</p>
    </div>

    <!-- Status panel (Top) -->
    <div class="stats-panel">
        <div class="progress-container">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">진행률: 0/74</div>
        </div>
        
        <!-- Instruction Text with drag handle prefix -->
        <div style="display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--text-sub); font-size: 0.95rem; margin-top: -5px; margin-bottom: 5px;">
            <div class="drag-handle" style="cursor: default; opacity: 0.4;">
                <svg width="12" height="18" viewBox="0 0 12 18" fill="currentColor">
                    <circle cx="2.5" cy="3" r="1.5" stroke="none" />
                    <circle cx="2.5" cy="9" r="1.5" stroke="none" />
                    <circle cx="2.5" cy="15" r="1.5" stroke="none" />
                    <circle cx="9.5" cy="3" r="1.5" stroke="none" />
                    <circle cx="9.5" cy="9" r="1.5" stroke="none" />
                    <circle cx="9.5" cy="15" r="1.5" stroke="none" />
                </svg>
            </div>
            <span>손잡이로 드래그하여 정렬, 탭으로 확인</span>
        </div>

        <div class="btn-group">
            <button class="btn-reset" onclick="resetAll()">
                🔄 초기화
            </button>
            <button class="btn-save" onclick="saveAsImage()">
                📸 이미지로 저장 (JPG)
            </button>
        </div>
    </div>

    <!-- Categories -->
    <div id="checklistCategories"></div>

    <!-- Controls (Bottom) -->
    <div class="stats-panel" style="margin-top: 30px;">
        <div class="btn-group" style="justify-content: center; width: 100%;">
            <button class="btn-reset" onclick="resetAll()">
                🔄 초기화
            </button>
            <button class="btn-save" onclick="saveAsImage()">
                📸 이미지로 저장 (JPG)
            </button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>만든이 @sigong &copy; 2026</p>
    </footer>
</div>

<script>
    // Updated checklist matching the provided web URL (Translated to Korean, grouped with subheaders)
    const packingList = {
        "회장 휴대용 배낭": {
            "[배면 포켓]": ["선크림", "페이스 시트", "맥주 너클 오프너", "모기 퇴치 스프레이"],
            "[사이드 포켓]": ["물병/텀블러"],
            "[내용물]": ["수건", "판초 우의 (파랑)", "플리스"],
            "<노란 파우치>": ["보조배터리", "USB 케이블류", "헤드랜턴", "AAA 건전지"],
            "<빨간 파우치>": ["스포츠 테이핑 테이프", "대일밴드 (반창고)", "손톱깎이", "콘택트렌즈", "소염진통제 (로키소닌)", "파스 (로키소닌 패치)", "휴대용 티슈"]
        },
        "숙소 배낭": {
            "[등 포켓]": ["지갑 (카드류 제외)"],
            "[내용물]": ["비닐봉지", "페스티벌용 T셔츠 (3장)", "속옷 (1장)", "양말 (1켤레)", "여분 수건", "3일차 손수건", "헤어 스프레이", "스킨/토너", "크림", "면도기"]
        },
        "차에 두고 갈 것": {
            "": ["에어매트", "미니 아이스박스", "접이식 우산"],
            "[대시보드]": ["주차권", "손목밴드 (입장권)", "타임테이블"],
            "[차박 박스]": ["바디 시트", "취침용 T셔츠", "속옷 (2장)", "양말 (1켤레)", "복귀용 여분 옷", "비닐봉지 (여분)", "2일차 수건", "3일차 수건", "막 쓰는 수건", "2일차 손수건 (빨아서 쓰기)", "모자 (캡)"],
            "[기타 박스]": ["장화", "샌들", "차량용 햇빛 가리개"],
            "[노란 배낭]": ["접이식 의자 (대)"]
        },
        "당일 챙길 것": {
            "<카드 지갑 (UnderTheSun)>": ["건강보험증", "운전면허증", "현금"],
            "<기타>": ["손수건", "집 열쇠", "차 열쇠", "애플워치", "애플워치 충전기/배터리", "멀티탭", "스킨/토너 (여행용)", "크림 (여행용)", "면도기 (여분)", "무선 이어폰"]
        },
        "당일 착용할 것": {
            "": ["선글라스", "햇 (모자)", "기능성 이너웨어", "기능성 상의", "기능성 하의", "T셔츠", "속건성 바지", "속옷", "손수건", "스마트폰"]
        }
    };

    // Filter out obsolete items from localStorage to prevent progress bar errors
    const allPackingItems = new Set();
    for (const catData of Object.values(packingList)) {
        for (const items of Object.values(catData)) {
            items.forEach(item => allPackingItems.add(item));
        }
    }
    const savedItems = JSON.parse(localStorage.getItem('fujirock_checked_items') || '[]');
    let checkedItems = new Set(savedItems.filter(item => allPackingItems.has(item)));

    // Load collapsed preference from localStorage
    let collapsedCategories = new Set(JSON.parse(localStorage.getItem('fujirock_collapsed_categories') || '[]'));

    // Drag and Drop Logic
    let dragSourceEl = null;

    function handleDragStart(e) {
        dragSourceEl = this;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) {
        e.preventDefault();
        const draggingEl = document.querySelector('.dragging');
        if (!draggingEl) return;
        
        if (draggingEl.classList.contains('category-card') && this.classList.contains('category-card')) {
            const parent = this.parentNode;
            const children = Array.from(parent.children);
            const sourceIndex = children.indexOf(draggingEl);
            const targetIndex = children.indexOf(this);
            if (sourceIndex < targetIndex) {
                parent.insertBefore(draggingEl, this.nextSibling);
            } else {
                parent.insertBefore(draggingEl, this);
            }
        } else if ((draggingEl.classList.contains('checklist-item') || draggingEl.classList.contains('checklist-subheader')) && 
                   (this.classList.contains('checklist-item') || this.classList.contains('checklist-subheader'))) {
            // Drag across categories is allowed (we no longer check same parent)
            const parent = this.parentNode;
            const children = Array.from(parent.children);
            const sourceIndex = children.indexOf(draggingEl);
            const targetIndex = children.indexOf(this);
            if (sourceIndex < targetIndex) {
                parent.insertBefore(draggingEl, this.nextSibling);
            } else {
                parent.insertBefore(draggingEl, this);
            }
        }
    }

    function handleDragEnd(e) {
        this.classList.remove('dragging');
        this.setAttribute('draggable', 'false');
        saveCurrentOrder();
        
        // Re-render checklist to recalculate visual indentations after drag-and-drop
        renderChecklist();
    }

    // Save custom category and items layout order to localStorage
    function saveCurrentOrder() {
        const order = {
            categories: [],
            items: {}
        };
        
        const cards = document.querySelectorAll('.category-card');
        cards.forEach(card => {
            const categoryName = card.querySelector('.category-title').innerText;
            order.categories.push(categoryName);
            
            order.items[categoryName] = [];
            const listContainer = card.querySelector('.checklist-list');
            const children = listContainer.children;
            for (let child of children) {
                if (child.classList.contains('checklist-subheader')) {
                    order.items[categoryName].push({ type: 'subheader', text: child.getAttribute('data-text') });
                } else if (child.classList.contains('checklist-item')) {
                    order.items[categoryName].push({ type: 'item', text: child.getAttribute('data-text') });
                }
            }
        });
        
        localStorage.setItem('fujirock_checklist_order', JSON.stringify(order));
    }

    // Load custom layout order or fallback to default
    function getSavedOrder() {
        const saved = localStorage.getItem('fujirock_checklist_order');
        if (saved) {
            return JSON.parse(saved);
        }
        
        // Generate default order structure if not already saved
        const order = {
            categories: Object.keys(packingList),
            items: {}
        };
        for (const [category, categoryData] of Object.entries(packingList)) {
            order.items[category] = [];
            for (const [subheader, items] of Object.entries(categoryData)) {
                if (subheader) {
                    order.items[category].push({ type: 'subheader', text: subheader });
                }
                items.forEach(item => {
                    order.items[category].push({ type: 'item', text: item });
                });
            }
        }
        localStorage.setItem('fujirock_checklist_order', JSON.stringify(order));
        return order;
    }

    // Toggle collapse/expand status of a category card
    function toggleCategory(category) {
        const card = document.getElementById(`card-${category}`);
        if (card.classList.contains('collapsed')) {
            card.classList.remove('collapsed');
            collapsedCategories.delete(category);
        } else {
            card.classList.add('collapsed');
            collapsedCategories.add(category);
        }
        localStorage.setItem('fujirock_collapsed_categories', JSON.stringify(Array.from(collapsedCategories)));
    }

    // Initialize list and render in DOM
    function renderChecklist() {
        const container = document.getElementById('checklistCategories');
        container.innerHTML = '';
        
        const currentOrder = getSavedOrder();

        for (const category of currentOrder.categories) {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.id = `card-${category}`;
            if (collapsedCategories.has(category)) {
                card.classList.add('collapsed');
            }

            // Drag events for Category Card
            card.addEventListener('dragstart', handleDragStart);
            card.addEventListener('dragover', handleDragOver);
            card.addEventListener('dragend', handleDragEnd);

            // Category Header (clickable for collapse/expand toggle)
            const header = document.createElement('div');
            header.className = 'category-header';
            header.addEventListener('click', (e) => {
                if (e.target.closest('.drag-handle')) return; // ignore click on drag handle
                toggleCategory(category);
            });

            const titleContainer = document.createElement('div');
            titleContainer.style.display = 'flex';
            titleContainer.style.alignItems = 'center';

            // Drag handle for Category Card (SVG dots)
            const dragHandle = document.createElement('div');
            dragHandle.className = 'drag-handle category-drag-handle';
            dragHandle.innerHTML = `
                <svg width="12" height="18" viewBox="0 0 12 18" fill="currentColor">
                    <circle cx="2.5" cy="3" r="1.5" stroke="none" />
                    <circle cx="2.5" cy="9" r="1.5" stroke="none" />
                    <circle cx="2.5" cy="15" r="1.5" stroke="none" />
                    <circle cx="9.5" cy="3" r="1.5" stroke="none" />
                    <circle cx="9.5" cy="9" r="1.5" stroke="none" />
                    <circle cx="9.5" cy="15" r="1.5" stroke="none" />
                </svg>
            `;
            dragHandle.addEventListener('mousedown', () => card.setAttribute('draggable', 'true'));
            dragHandle.addEventListener('mouseup', () => card.setAttribute('draggable', 'false'));

            titleContainer.appendChild(dragHandle);

            const title = document.createElement('span');
            title.className = 'category-title';
            title.innerText = category;
            titleContainer.appendChild(title);
            header.appendChild(titleContainer);

            // Badge and arrow container
            const badgeContainer = document.createElement('div');
            badgeContainer.style.display = 'flex';
            badgeContainer.style.alignItems = 'center';
            badgeContainer.style.gap = '10px';

            const badge = document.createElement('span');
            badge.className = 'category-badge';
            badge.id = `badge-${category}`;
            badgeContainer.appendChild(badge);

            const arrow = document.createElement('span');
            arrow.className = 'toggle-arrow';
            arrow.innerText = '▲';
            badgeContainer.appendChild(arrow);

            header.appendChild(badgeContainer);
            card.appendChild(header);

            // Category Content
            const content = document.createElement('div');
            content.className = 'category-content';
            content.id = `content-${category}`;

            const list = document.createElement('div');
            list.className = 'checklist-list';
            list.id = `list-${category}`;

            // Allow dropping onto empty list containers or empty spaces within lists
            list.addEventListener('dragover', (e) => {
                e.preventDefault();
                const draggingEl = document.querySelector('.dragging');
                if (!draggingEl) return;
                
                if ((draggingEl.classList.contains('checklist-item') || draggingEl.classList.contains('checklist-subheader')) && 
                    list.children.length === 0) {
                    list.appendChild(draggingEl);
                }
            });

            const categoryItems = currentOrder.items[category] || [];
            
            // Track if current item should be nested under a subheading
            let activeSubheader = false;

            categoryItems.forEach(node => {
                if (node.type === 'subheader') {
                    activeSubheader = node.text;
                    const subHeaderDiv = document.createElement('div');
                    subHeaderDiv.className = 'checklist-subheader';
                    subHeaderDiv.setAttribute('data-text', node.text);
                    subHeaderDiv.style.display = 'flex';
                    subHeaderDiv.style.alignItems = 'center';
                    subHeaderDiv.style.fontWeight = 'bold';
                    subHeaderDiv.style.color = 'var(--accent)';
                    subHeaderDiv.style.marginTop = '12px';
                    subHeaderDiv.style.marginBottom = '6px';
                    subHeaderDiv.style.fontSize = '1.05rem';

                    // Subheader drag handle
                    const subHandle = document.createElement('div');
                    subHandle.className = 'drag-handle item-drag-handle';
                    subHandle.innerHTML = `
                        <svg width="12" height="18" viewBox="0 0 12 18" fill="currentColor">
                            <circle cx="2.5" cy="3" r="1.5" stroke="none" />
                            <circle cx="2.5" cy="9" r="1.5" stroke="none" />
                            <circle cx="2.5" cy="15" r="1.5" stroke="none" />
                            <circle cx="9.5" cy="3" r="1.5" stroke="none" />
                            <circle cx="9.5" cy="9" r="1.5" stroke="none" />
                            <circle cx="9.5" cy="15" r="1.5" stroke="none" />
                        </svg>
                    `;
                    subHandle.addEventListener('mousedown', () => subHeaderDiv.setAttribute('draggable', 'true'));
                    subHandle.addEventListener('mouseup', () => subHeaderDiv.setAttribute('draggable', 'false'));

                    subHeaderDiv.appendChild(subHandle);

                    const subTextSpan = document.createElement('span');
                    subTextSpan.innerText = `— ${node.text}`;
                    subHeaderDiv.appendChild(subTextSpan);

                    // Subheader Drag Events
                    subHeaderDiv.addEventListener('dragstart', handleDragStart);
                    subHeaderDiv.addEventListener('dragover', handleDragOver);
                    subHeaderDiv.addEventListener('dragend', handleDragEnd);

                    list.appendChild(subHeaderDiv);
                } else if (node.type === 'item') {
                    const label = document.createElement('label');
                    label.className = 'checklist-item';
                    label.setAttribute('data-text', node.text);
                    if (activeSubheader) {
                        label.style.paddingLeft = '15px'; // Indent grouped items
                    }

                    // Item drag handle
                    const itemHandle = document.createElement('div');
                    itemHandle.className = 'drag-handle item-drag-handle';
                    itemHandle.innerHTML = `
                        <svg width="12" height="18" viewBox="0 0 12 18" fill="currentColor">
                            <circle cx="2.5" cy="3" r="1.5" stroke="none" />
                            <circle cx="2.5" cy="9" r="1.5" stroke="none" />
                            <circle cx="2.5" cy="15" r="1.5" stroke="none" />
                            <circle cx="9.5" cy="3" r="1.5" stroke="none" />
                            <circle cx="9.5" cy="9" r="1.5" stroke="none" />
                            <circle cx="9.5" cy="15" r="1.5" stroke="none" />
                        </svg>
                    `;
                    itemHandle.addEventListener('mousedown', () => label.setAttribute('draggable', 'true'));
                    itemHandle.addEventListener('mouseup', () => label.setAttribute('draggable', 'false'));

                    label.appendChild(itemHandle);

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = checkedItems.has(node.text);
                    checkbox.addEventListener('change', () => toggleItem(node.text, checkbox.checked));

                    const checkmark = document.createElement('span');
                    checkmark.className = 'checkmark';

                    const text = document.createElement('span');
                    text.className = 'item-text';
                    text.innerText = node.text;

                    label.appendChild(checkbox);
                    label.appendChild(checkmark);
                    label.appendChild(text);

                    // Item Drag Events
                    label.addEventListener('dragstart', handleDragStart);
                    label.addEventListener('dragover', handleDragOver);
                    label.addEventListener('dragend', handleDragEnd);

                    list.appendChild(label);
                }
            });

            content.appendChild(list);
            card.appendChild(content);
            container.appendChild(card);
        }

        updateProgress();
    }

    // Toggle check status and sync to localStorage
    function toggleItem(item, isChecked) {
        if (isChecked) {
            checkedItems.add(item);
        } else {
            checkedItems.delete(item);
        }
        localStorage.setItem('fujirock_checked_items', JSON.stringify(Array.from(checkedItems)));
        updateProgress();
    }

    // Calculate total count and update progress UI based on current order data
    function updateProgress() {
        let grandTotal = 0;
        let grandChecked = 0;
        
        const currentOrder = getSavedOrder();
        
        for (const category of currentOrder.categories) {
            let catTotal = 0;
            let catChecked = 0;
            
            const categoryItems = currentOrder.items[category] || [];
            categoryItems.forEach(node => {
                if (node.type === 'item') {
                    catTotal++;
                    if (checkedItems.has(node.text)) {
                        catChecked++;
                    }
                }
            });
            
            grandTotal += catTotal;
            grandChecked += catChecked;
            
            const badge = document.getElementById(`badge-${category}`);
            if (badge) {
                badge.innerText = `${catChecked}/${catTotal}`;
                if (catChecked === catTotal && catTotal > 0) {
                    badge.classList.add('complete');
                } else {
                    badge.classList.remove('complete');
                }
            }
        }

        const fillPercent = grandTotal > 0 ? (grandChecked / grandTotal) * 100 : 0;
        document.getElementById('progressFill').style.width = `${fillPercent}%`;
        document.getElementById('progressText').innerText = `진행률: ${grandChecked}/${grandTotal}`;
    }

    // Clear state
    function resetAll() {
        if (confirm("모든 체크 상태를 초기화하시겠습니까?")) {
            checkedItems.clear();
            localStorage.removeItem('fujirock_checked_items');
            renderChecklist();
        }
    }

    // Draw checklist as a downloadable high-quality mobile JPG image using Canvas API
    function saveAsImage() {
        const canvas = document.createElement('canvas');
        
        // Dynamically compute height based on actual list sizes and subheaders to prevent clipping
        const categories = Object.keys(packingList);
        let totalItemsCount = 0;
        let numSubheaders = 0;
        for (const catData of Object.values(packingList)) {
            for (const [subheader, items] of Object.entries(catData)) {
                totalItemsCount += items.length;
                if (subheader) numSubheaders++;
            }
        }
        const numCategories = categories.length;
        
        canvas.height = 250 + (totalItemsCount * 35) + (numSubheaders * 35) + (numCategories * 65) + 100;
        
        const ctx = canvas.getContext('2d');

        // Background (#1A1A24)
        ctx.fillStyle = '#1A1A24';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Header (no emojis for perfect cross-platform text rendering stability)
        ctx.fillStyle = '#FF8A00';
        ctx.font = 'bold 36px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('FUJI ROCK FESTIVAL', canvas.width / 2, 70);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = '20px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
        ctx.fillText('후지록 페스티벌 준비물 체크리스트', canvas.width / 2, 110);

        // Progress Calculations
        const progressPct = totalItemsCount > 0 ? Math.round((checkedItems.size / totalItemsCount) * 100) : 0;

        // Progress bar container
        ctx.fillStyle = '#2D2D3D';
        drawRoundedRect(ctx, 80, 140, canvas.width - 160, 24, 12);
        ctx.fill();

        // Progress bar fill
        if (checkedItems.size > 0) {
            ctx.fillStyle = '#FF4B4B';
            const fillWidth = ((canvas.width - 160) * checkedItems.size) / totalItemsCount;
            drawRoundedRect(ctx, 80, 140, fillWidth, 24, 12);
            ctx.fill();
        }

        // Progress text
        ctx.fillStyle = '#A0A0B0';
        ctx.font = '20px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
        ctx.fillText(`진행률: ${progressPct}% (${checkedItems.size} / ${totalItemsCount})`, canvas.width / 2, 195);

        // Divider
        ctx.strokeStyle = '#3D3D4D';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(60, 220);
        ctx.lineTo(canvas.width - 60, 220);
        ctx.stroke();

        // Draw categories & items using the current custom drag-and-drop order
        let currY = 260;
        const xLeft = 80;
        const currentOrder = getSavedOrder();

        for (const category of currentOrder.categories) {
            // Category header
            ctx.fillStyle = '#FF8A00';
            ctx.font = 'bold 26px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(category, xLeft, currY);
            currY += 45;

            const categoryItems = currentOrder.items[category] || [];
            let activeSubheader = false;

            categoryItems.forEach(node => {
                if (node.type === 'subheader') {
                    activeSubheader = node.text;
                    ctx.fillStyle = '#FF4B4B';
                    ctx.font = 'bold 20px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
                    ctx.fillText(`— ${node.text}`, xLeft + 10, currY);
                    currY += 35;
                } else if (node.type === 'item') {
                    const isChecked = checkedItems.has(node.text);
                    const boxSize = 20;
                    const boxX = activeSubheader ? xLeft + 20 : xLeft + 10;
                    const boxY = currY - 18; // Align box with text line

                    if (isChecked) {
                        // Draw checked checkbox
                        ctx.fillStyle = '#FF4B4B';
                        drawRoundedRect(ctx, boxX, boxY, boxSize, boxSize, 4);
                        ctx.fill();

                        // Draw checkmark lines
                        ctx.strokeStyle = '#FFFFFF';
                        ctx.lineWidth = 2.5;
                        ctx.beginPath();
                        ctx.moveTo(boxX + 5, boxY + 10);
                        ctx.lineTo(boxX + 9, boxY + 14);
                        ctx.lineTo(boxX + 15, boxY + 6);
                        ctx.stroke();
                    } else {
                        // Draw empty checkbox
                        ctx.strokeStyle = '#A0A0B0';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        drawRoundedRect(ctx, boxX, boxY, boxSize, boxSize, 4);
                        ctx.stroke();
                    }

                    // Draw label text
                    ctx.fillStyle = isChecked ? '#A0A0B0' : '#FFFFFF';
                    ctx.font = '22px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
                    ctx.fillText(node.text, boxX + boxSize + 20, currY);
                    currY += 35;
                }
            });

            currY += 20; // Category spacer gap
        }

        // Draw footer
        ctx.fillStyle = '#505060';
        ctx.font = '20px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('만든이 @sigong © 2026', canvas.width / 2, canvas.height - 40);

        // Download trigger
        try {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = 'fujirock_checklist.jpg';
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } catch (e) {
            alert('이미지 저장에 실패했습니다: ' + e.message);
        }
    }

    // Helper for rounded rectangles on canvas
    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    // Initialize list on load
    window.onload = renderChecklist;
</script>
